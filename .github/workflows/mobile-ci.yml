name: mobile CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "scripts/check-reasoning-protocol-sync.ps1"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    types: [opened, synchronize]
    paths:
      - "mobile/**"
      - "scripts/check-reasoning-protocol-sync.ps1"
      - ".github/workflows/mobile-ci.yml"
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          # 22+：utils/markdown.js 是无 type 标记的 ESM，Node 18 无模块语法探测会直接
          # SyntaxError（Node 18 已 EOL；本地开发用 24）
          node-version: 22
          # 不配 npm 缓存：根 .gitignore 有意忽略 package-lock.json，无 lockfile 时
          # cache-dependency-path 解析失败会让 setup-node 直接报错

      - name: Install
        run: npm install

      - name: Contract tests (SSE + markdown)
        run: npm test

      - name: Bundle size check (skip if no build)
        run: npm run check:bundle
        # HBuilderX is required to produce a build; on CI the build dir is absent,
        # so check-bundle-size.js exits 0 with a [skip] message automatically.

  reasoning-protocol-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history for freeze gate diff

      - name: Run sync gate
        shell: pwsh
        run: pwsh scripts/check-reasoning-protocol-sync.ps1

      - name: Freeze gate (block reasoning-protocol changes when .omc/freeze.flag present)
        shell: bash
        run: |
          if [ -f .omc/freeze.flag ]; then
            echo "Freeze flag content:"
            cat .omc/freeze.flag
            BASE_REF="${{ github.base_ref || 'main' }}"
            git fetch origin "$BASE_REF" --depth=50 2>/dev/null || true
            CHANGED=$(git diff --name-only "origin/$BASE_REF"...HEAD 2>/dev/null || git diff --name-only HEAD~1...HEAD)
            echo "Changed files:"
            echo "$CHANGED"
            if echo "$CHANGED" | grep -q 'nlq-agent/packages/shared-types/src/reasoning-protocol.ts'; then
              echo "::error::Freeze flag active but this PR modifies reasoning-protocol.ts. Coordinate with frontend wave owner before unfreezing."
              exit 1
            fi
            echo "Freeze flag present but reasoning-protocol.ts unchanged — OK"
          else
            echo "No freeze flag; reasoning-protocol changes allowed"
          fi

  manifest-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # uni-app 的 manifest.json/pages.json 是 jsonc（允许 BOM、注释、尾逗号），
      # 裸 JSON.parse 会误报——manifest.json 实际带 BOM、pages.json 带注释
      - name: Validate manifest.json / pages.json (jsonc)
        run: node mobile/scripts/validate-jsonc.js mobile/manifest.json mobile/pages.json
