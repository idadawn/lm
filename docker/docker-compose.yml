# ============================================
# 应用服务 - Docker Compose 配置（入口目录：docker/）
# 说明：
# - 为了平滑把 apps/ 改名为 docker/，这里使用 ../apps 作为构建上下文与 volumes 来源
# - 后续如果你在本地真正执行了目录重命名（apps -> docker），可再把这些 ../apps 路径收敛为 .
# ============================================

services:
  api:
    build:
      context: ../apps
      dockerfile: Dockerfile
      network: host
    image: ${API_IMAGE:-lm-api}:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_PREFIX:-lm}-api-${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${API_PORT:-9530}:9530"
    environment:
      - ASPNETCORE_ENVIRONMENT=production
      - ASPNETCORE_URLS=http://+:9530
      - DOTNET_PRINT_TELEMETRY_MESSAGE=false
    volumes:
      - ${VOLUMES_DIR:-../apps/volumes}/api/logs:/app/logs
      - ${VOLUMES_DIR:-../apps/volumes}/api/uploads:/app/uploads
      - ${VOLUMES_DIR:-../apps/volumes}/api/Configurations:/app/Configurations
      - ${VOLUMES_DIR:-../apps/volumes}/api/wwwroot:/app/wwwroot
      - ${VOLUMES_DIR:-../apps/volumes}/api/resources/:/app/resources/
      - ${VOLUMES_DIR:-../apps/volumes}/api/lib/:/app/lib/
    networks:
      - lm-apps-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9530/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ../apps
      dockerfile: web/Dockerfile
      network: host
    image: ${WEB_IMAGE:-lm-web}:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_PREFIX:-lm}-web-${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - lm-apps-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:${NGINX_VERSION:-1.27-alpine}
    container_name: ${CONTAINER_PREFIX:-lm}-nginx-${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8923}:80"
    volumes:
      - ${VOLUMES_DIR:-../apps/volumes}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${VOLUMES_DIR:-../apps/volumes}/nginx/conf.d/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${VOLUMES_DIR:-../apps/volumes}/nginx/ssl:/etc/nginx/ssl:ro
      - ${VOLUMES_DIR:-../apps/volumes}/nginx/docker-entrypoint.sh:/custom-entrypoint.sh:ro
    environment:
      - API_SERVICE_NAME=${API_SERVICE_NAME:-api}
      - WEB_SERVICE_NAME=${WEB_SERVICE_NAME:-web}
      - API_PORT=${API_PORT}
      - WEB_INTERNAL_PORT=${WEB_INTERNAL_PORT:-80}
    entrypoint: ["/bin/sh", "/custom-entrypoint.sh"]
    command: ["nginx", "-g", "daemon off;"]
    networks:
      - lm-apps-network
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    tmpfs:
      - /etc/nginx/conf.d:rw,size=10m
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  lm-apps-network:
    name: ${NETWORK_NAME:-lm-apps-network}
    driver: bridge

