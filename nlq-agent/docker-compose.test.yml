# docker-compose.test.yml — 测试专用 MySQL 实例
#
# 使用方式：
#   docker compose -f docker-compose.test.yml up -d --wait
#   pytest -m "not live_llm" -x
#   docker compose -f docker-compose.test.yml down -v
#
# 端口映射：nlq-mysql-test:33307 → 容器 3306

services:
  nlq-mysql-test:
    image: mysql:8.0
    container_name: nlq-mysql-test
    ports:
      - "33307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: test_pw
      MYSQL_DATABASE: lumei
      TZ: UTC
    volumes:
      - ./tests/fixtures/seed_lab.sql:/docker-entrypoint-initdb.d/01-seed_lab.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --sql-mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptest_pw"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: "no"
