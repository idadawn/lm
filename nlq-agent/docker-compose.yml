# ═══════════════════════════════════════════════════════════════
# nlq-agent 完整服务编排
#
# 包含：
#   - nlq-agent:   FastAPI 问答微服务 (port 18100)
#   - qdrant:      向量数据库 (port 6333/6334)
#   - tei:         Text Embeddings Inference (port 8001)
#   - vllm:        LLM 推理服务 (port 8000) — 可选，可用外部服务替代
#
# 使用方式：
#   docker compose up -d                # 启动所有服务
#   docker compose up -d --no-deps nlq-agent  # 仅启动 nlq-agent
#   docker compose logs -f nlq-agent    # 查看日志
# ═══════════════════════════════════════════════════════════════

services:

  # ── nlq-agent 问答微服务 ──────────────────────────────────
  nlq-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nlq-agent
    ports:
      - "18100:18100"
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nlq-network

  # ── Qdrant 向量数据库 ────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: nlq-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && echo -e \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && timeout 2 cat <&3 | grep -q 200'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nlq-network

  # ── TEI Embedding 服务 ───────────────────────────────────
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: nlq-tei
    ports:
      - "8001:80"
    volumes:
      - tei_cache:/data
    environment:
      - MODEL_ID=BAAI/bge-large-zh-v1.5
    command: ["--model-id", "BAAI/bge-large-zh-v1.5", "--port", "80"]
    restart: unless-stopped
    networks:
      - nlq-network

  # ── vLLM 推理服务（可选）─────────────────────────────────
  # 如果已有外部 LLM 服务，可注释掉此部分，
  # 在 .env 中配置 LLM_BASE_URL 指向外部服务即可。
  #
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   container_name: nlq-vllm
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - vllm_cache:/root/.cache/huggingface
  #   environment:
  #     - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
  #   command: >
  #     --model Qwen/Qwen2.5-72B-Instruct-AWQ
  #     --quantization awq
  #     --max-model-len 8192
  #     --gpu-memory-utilization 0.9
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #   restart: unless-stopped
  #   networks:
  #     - nlq-network

volumes:
  qdrant_data:
    driver: local
  tei_cache:
    driver: local
  # vllm_cache:
  #   driver: local

networks:
  nlq-network:
    driver: bridge
