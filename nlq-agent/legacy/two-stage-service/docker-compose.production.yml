# ═══════════════════════════════════════════════════════════════
# nlq-agent Production Docker Compose
#
# 包含：
#   - nlq-agent:   FastAPI 生产微服务 (port 18100)
#   - qdrant:      向量数据库 (port 6333/6334)
#   - tei:         Text Embeddings Inference (port 8001)
#
# 注意：
#   - 生产 MySQL 由外部业务集群提供，不在本编排内
#   - .env.production 需提前准备并填入真实连接信息
#
# 使用方式：
#   docker compose -f docker-compose.production.yml --env-file .env.production up -d
#   docker compose -f docker-compose.production.yml --env-file .env.production logs -f
# ═══════════════════════════════════════════════════════════════

services:

  # ── nlq-agent 生产微服务 ──────────────────────────────────
  nlq-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nlq-agent-prod
    ports:
      - "18100:18100"
    env_file:
      - .env.production
    depends_on:
      qdrant:
        condition: service_healthy
      tei:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18100/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - nlq-network

  # ── Qdrant 向量数据库 ────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: nlq-qdrant-prod
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - /data/nlq-agent/qdrant/storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nlq-network

  # ── TEI Embedding 服务（GPU 版）───────────────────────────
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:1.5
    container_name: nlq-tei-prod
    profiles:
      - ""
    # 使用 host 网络模式，TEI 直接监听宿主机 8001 端口
    network_mode: host
    volumes:
      - /data/nlq-agent/tei/cache:/data
      - /data/nlq-agent/tei/models:/models
    environment:
      - MODEL_ID=/models/bge-large-zh-v1.5
    command: ["--model-id", "/models/bge-large-zh-v1.5", "--port", "8001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # ── TEI Embedding 服务（CPU fallback）─────────────────────
  tei-cpu:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: nlq-tei-cpu-prod
    profiles:
      - cpu
    ports:
      - "8001:80"
    volumes:
      - /data/nlq-agent/tei/cache:/data
    environment:
      - MODEL_ID=BAAI/bge-large-zh-v1.5
    command: ["--model-id", "BAAI/bge-large-zh-v1.5", "--port", "80"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - nlq-network

networks:
  nlq-network:
    driver: bridge
