# ═══════════════════════════════════════════════════════════════
# nlq-agent 本地向量服务（Qdrant + TEI GPU）
#
# 说明：
#   - 不包含 vLLM，LLM 请通过外部 API 提供
#   - 数据卷挂载到 /data/nlq-agent/，避免存入项目目录
#
# 使用方式：
#   docker compose -f docker-compose.vectors.yml up -d
#   docker compose -f docker-compose.vectors.yml logs -f
# ═══════════════════════════════════════════════════════════════

services:

  # ── Qdrant 向量数据库 ────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: nlq-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - /data/nlq-agent/qdrant/storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── TEI Embedding 服务（GPU 版）───────────────────────────
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:1.5
    container_name: nlq-tei
    # 使用 host 网络模式，TEI 直接监听宿主机 8001 端口
    network_mode: host
    volumes:
      - /data/nlq-agent/tei/cache:/data
      - /data/nlq-agent/tei/models:/models
    environment:
      - MODEL_ID=/models/bge-large-zh-v1.5
    command: ["--model-id", "/models/bge-large-zh-v1.5", "--port", "8001"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
