# docker-compose 片段：把这个文件合并到主 docker-compose.yml，或单独跑测试。
#
# 用法：
#   docker compose -f docker-compose.yml -f docker-compose.lightrag.yml up -d
#
# 或者直接当独立 stack 跑（用于本地开发）：
#   docker compose -f docker-compose.lightrag.yml up
#
# 关键点：
#   - data/lightrag 卷持久化，容器删了重建索引还在
#   - LIGHTRAG_ENABLED=true 是开关，关掉则 nlq-agent 降级到静态 knowledge_base.json
#   - 共享主项目的 LiteLLM + Neo4j + MySQL 服务（用 external_links 引用）
version: "3.9"

services:
  nlq-agent:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        PREFETCH_EMBEDDING: "true"     # 镜像里预下载 BGE 模型
    container_name: nlq-agent
    environment:
      # ── LightRAG 配置 ───────────────────────────────────────
      LIGHTRAG_ENABLED: "true"
      LIGHTRAG_WORKING_DIR: /app/data/lightrag
      LIGHTRAG_EMBEDDING_MODEL: BAAI/bge-small-zh-v1.5
      LIGHTRAG_EMBEDDING_DIM: "512"
      LIGHTRAG_EMBEDDING_DEVICE: cuda     # 有 GPU 改 "cuda"
      LIGHTRAG_CONFIDENCE_THRESHOLD: "0.85"
      LIGHTRAG_CONTEXT_TOP_K: "5"

      # ── 现有 nlq-agent 配置（按你环境的 .env 来）─────────────
      DATABASE_URL: ${DATABASE_URL:-mysql+aiomysql://root:password@mysql:3306/lab_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://litellm:4000}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-sk-litellm-master-key}
      NEO4J_ENABLED: ${NEO4J_ENABLED:-false}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}

      # 让 sentence-transformers 走容器内缓存，无外网也能加载模型
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_OFFLINE: "1"

    volumes:
      # ★ LightRAG 索引持久化（即使容器删了，索引数据仍在主机上）
      - lightrag_data:/app/data/lightrag
      # HuggingFace 模型缓存
      - hf_cache:/app/.cache/huggingface
      # dev 模式热加载：把代码挂进去，改了立即生效
      - ./:/app
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s    # 首次启动慢，包含 LightRAG init + 模型加载

volumes:
  lightrag_data:
    driver: local
  hf_cache:
    driver: local
