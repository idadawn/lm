# =============================================================================
# nlq-vanna-service — 独立 stack
#
# 此 compose 文件是完全独立的，不引用主项目 docker/docker-compose.yml，
# 不依赖任何外部 network。所有端口对齐既有约定：
#   qdrant          6333
#   tei             8081
#   vllm            8082
#   nlq-vanna-svc   8088
#
# 启动：docker compose up -d
# 停止：docker compose down
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Qdrant 向量数据库
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: nlq_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - nlq-vanna-net

  # ---------------------------------------------------------------------------
  # TEI 嵌入服务（text-embeddings-inference CPU 版）
  # 默认模型：BAAI/bge-m3（dim=1024，与 TEI_EMBEDDING_DIM 对齐）
  # 如需 GPU 版，替换 image tag 为 ghcr.io/huggingface/text-embeddings-inference:1.5
  # ---------------------------------------------------------------------------
  # 默认 OpenAI 兼容嵌入（即 .env 的 TEI_URL 指向远程 API），无需自起容器。
  # 仅当确实想本机自托管 HuggingFace TEI 时，加 --profile tei 启动该服务，
  # 并把 TEI_URL 切回 http://localhost:8081（注意 TEI 原生 /embed 协议
  # 不兼容当前 OpenAIEmbedMixin —— 需要 TEI 启动时带 OpenAI 兼容 flag，
  # 或自行回滚 tei_embed.py 实现）。
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: nlq_tei
    restart: unless-stopped
    profiles: ["tei"]
    ports:
      - "8081:80"
    environment:
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    volumes:
      - tei_data:/data
    command: ["--model-id", "BAAI/bge-m3"]
    networks:
      - nlq-vanna-net

  # ---------------------------------------------------------------------------
  # vLLM OpenAI-compatible 推理服务
  # P3 待确认：将 <TBD by P3> 替换为实际部署的模型 ID（Day 1 前确认）
  # 示例：Qwen2.5-Coder-7B-Instruct / deepseek-coder-7b-instruct-v1.5
  # ---------------------------------------------------------------------------
  vllm:
    image: vllm/vllm-openai:latest
    container_name: nlq_vllm
    restart: unless-stopped
    ports:
      - "8082:8000"
    environment:
      MODEL: "<TBD by P3>"
    networks:
      - nlq-vanna-net

  # ---------------------------------------------------------------------------
  # nlq-vanna-service 本体
  # ---------------------------------------------------------------------------
  nlq-vanna-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nlq_vanna_service
    restart: unless-stopped
    ports:
      - "8088:8088"
    env_file:
      - .env
    # 注意：tei/vllm 默认走外部 OpenAI 兼容服务（见 .env 的 TEI_URL/VLLM_URL），
    # 仅 qdrant 是本 stack 必须先起的依赖。如果用本机自托管模式（profile=tei
    # 或 profile=vllm），需自行加回 depends_on。
    depends_on:
      - qdrant
    networks:
      - nlq-vanna-net

# -----------------------------------------------------------------------------
# Named volumes
# -----------------------------------------------------------------------------
volumes:
  qdrant_data:
  tei_data:

# -----------------------------------------------------------------------------
# Internal network — isolated from host and main project stacks
# -----------------------------------------------------------------------------
networks:
  nlq-vanna-net:
    driver: bridge
