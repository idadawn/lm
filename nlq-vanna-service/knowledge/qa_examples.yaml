# 注意：本文件提供 JSON_EXTRACT 模式 few-shot 示例，业务方应基于真实 F_CONDITION JSON schema 调整 SQL
# 每条示例标注所属模式，共覆盖 5 种 JSON_EXTRACT 使用模式。
# TODO: 业务方根据真实 F_CONDITION 数据格式核对并调整各条 SQL。

# ============================================================
# 模式 1：单字段比较（single field comparison）
# JSON_EXTRACT 读取 metric + threshold，直接比较单个数值阈值
# ============================================================
- question: "120 规格 Ps 铁损大于 1.05 应判什么级？"
  # pattern: single_field_comparison
  sql: >
    SELECT j.F_NAME AS grade_name
    FROM LAB_INTERMEDIATE_DATA_JUDGMENT_LEVEL j
    JOIN LAB_PRODUCT_SPEC s ON j.F_PRODUCT_SPEC_ID = s.F_Id
    WHERE s.F_NAME = '120'
      AND JSON_EXTRACT(j.F_CONDITION, '$.metric') = 'F_PERF_PS_LOSS'
      AND CAST(JSON_EXTRACT(j.F_CONDITION, '$.threshold') AS DECIMAL(10,4)) <= 1.05
    ORDER BY j.F_PRIORITY DESC
    LIMIT 1

# ============================================================
# 模式 2：区间比较（between range）
# JSON_EXTRACT 读取 range 数组的上下边界，判断值是否落在区间内
# ============================================================
- question: "带宽在 119.5 到 120.5 mm 之间属于哪个等级？"
  # pattern: between_range
  sql: >
    SELECT j.F_NAME AS grade_name
    FROM LAB_INTERMEDIATE_DATA_JUDGMENT_LEVEL j
    JOIN LAB_PRODUCT_SPEC s ON j.F_PRODUCT_SPEC_ID = s.F_Id
    WHERE s.F_NAME = '120'
      AND JSON_EXTRACT(j.F_CONDITION, '$.metric') = 'F_WIDTH'
      AND JSON_EXTRACT(j.F_CONDITION, '$.operator') = 'between'
      AND CAST(JSON_EXTRACT(j.F_CONDITION, '$.range[0]') AS DECIMAL(10,4)) <= 119.5
      AND CAST(JSON_EXTRACT(j.F_CONDITION, '$.range[1]') AS DECIMAL(10,4)) >= 120.5
    ORDER BY j.F_PRIORITY DESC
    LIMIT 1

# ============================================================
# 模式 3：枚举匹配（in / JSON_CONTAINS）
# JSON_EXTRACT 读取 values 数组，用 JSON_CONTAINS 判断枚举包含
# ============================================================
- question: "质量状态为合格或观察的判级条件有哪些？"
  # pattern: enum_in_json_contains
  sql: >
    SELECT j.F_NAME AS grade_name, j.F_CONDITION, j.F_QUALITY_STATUS
    FROM LAB_INTERMEDIATE_DATA_JUDGMENT_LEVEL j
    JOIN LAB_PRODUCT_SPEC s ON j.F_PRODUCT_SPEC_ID = s.F_Id
    WHERE s.F_NAME = '120'
      AND JSON_EXTRACT(j.F_CONDITION, '$.operator') = 'in'
      AND (
        JSON_CONTAINS(JSON_EXTRACT(j.F_CONDITION, '$.values'), JSON_QUOTE('合格'))
        OR JSON_CONTAINS(JSON_EXTRACT(j.F_CONDITION, '$.values'), JSON_QUOTE('观察'))
      )
    ORDER BY j.F_PRIORITY DESC

# ============================================================
# 模式 4：AND-OR 嵌套多条件（compound AND/OR）
# 同时检查多个 JSON_EXTRACT 条件，用 AND/OR 组合
# ============================================================
- question: "120 规格中带宽合格且 Ps 铁损超标的批次有哪些？"
  # pattern: and_or_compound
  sql: >
    SELECT d.F_BATCH_NO, d.F_WIDTH, d.F_PERF_PS_LOSS
    FROM LAB_INTERMEDIATE_DATA d
    JOIN LAB_PRODUCT_SPEC s ON d.F_PRODUCT_SPEC_ID = s.F_Id
    WHERE s.F_NAME = '120'
      AND (
        (
          d.F_WIDTH >= 119.5
          AND d.F_PERF_PS_LOSS > (
            SELECT CAST(JSON_EXTRACT(j.F_CONDITION, '$.threshold') AS DECIMAL(10,4))
            FROM LAB_INTERMEDIATE_DATA_JUDGMENT_LEVEL j
            WHERE j.F_PRODUCT_SPEC_ID = s.F_Id
              AND JSON_EXTRACT(j.F_CONDITION, '$.metric') = 'F_PERF_PS_LOSS'
              AND JSON_EXTRACT(j.F_CONDITION, '$.operator') = '<='
            ORDER BY j.F_PRIORITY DESC
            LIMIT 1
          )
        )
        OR d.F_WIDTH < 119.0
      )
    ORDER BY d.F_PROD_DATE DESC

# ============================================================
# 模式 5：CASE WHEN 嵌套（CASE WHEN with JSON_EXTRACT）
# 根据 JSON_EXTRACT 读取的 metric 类型，用 CASE WHEN 分支处理不同指标
# ============================================================
- question: "列出 120 规格所有判级条件，按指标类型分类显示阈值？"
  # pattern: case_when_nested
  sql: >
    SELECT
      j.F_NAME AS grade_name,
      j.F_PRIORITY,
      JSON_EXTRACT(j.F_CONDITION, '$.metric') AS metric,
      CASE
        WHEN JSON_EXTRACT(j.F_CONDITION, '$.metric') = 'F_PERF_PS_LOSS'
          THEN CONCAT('铁损阈值: ', CAST(JSON_EXTRACT(j.F_CONDITION, '$.threshold') AS CHAR), ' W/kg')
        WHEN JSON_EXTRACT(j.F_CONDITION, '$.metric') = 'F_WIDTH'
          THEN CONCAT('带宽阈值: ', CAST(JSON_EXTRACT(j.F_CONDITION, '$.threshold') AS CHAR), ' mm')
        WHEN JSON_EXTRACT(j.F_CONDITION, '$.metric') = 'F_LAMINATION_COEFFICIENT'
          THEN CONCAT('叠片系数阈值: ', CAST(JSON_EXTRACT(j.F_CONDITION, '$.threshold') AS CHAR))
        ELSE CONCAT('其他指标阈值: ', CAST(JSON_EXTRACT(j.F_CONDITION, '$.threshold') AS CHAR))
      END AS threshold_desc
    FROM LAB_INTERMEDIATE_DATA_JUDGMENT_LEVEL j
    JOIN LAB_PRODUCT_SPEC s ON j.F_PRODUCT_SPEC_ID = s.F_Id
    WHERE s.F_NAME = '120'
    ORDER BY j.F_PRIORITY DESC

# ============================================================
# 模式 6：本月聚合（月份范围 + SUM）
# F_SINGLE_COIL_WEIGHT 是单卷重量（kg），用于"检验总重"统计
# F_PROD_DATE 是生产日期；MySQL 用 DATE_FORMAT(NOW(),'%Y-%m-01') 取本月起
# ============================================================
- question: "本月检验总重"
  # pattern: monthly_sum
  sql: >
    SELECT COALESCE(SUM(F_SINGLE_COIL_WEIGHT), 0) AS total_weight_kg
    FROM LAB_INTERMEDIATE_DATA
    WHERE F_DeleteMark = 0
      AND F_PROD_DATE >= DATE_FORMAT(NOW(), '%Y-%m-01')
      AND F_PROD_DATE < DATE_FORMAT(NOW() + INTERVAL 1 MONTH, '%Y-%m-01')

# ============================================================
# 模式 7：分组聚合（GROUP BY + SUM/COUNT）
# 按班组（F_SHIFT）统计检验总重；适合柱状图可视化
# ============================================================
- question: "本月按班组统计的检验总重"
  # pattern: group_by_aggregation
  sql: >
    SELECT
      F_SHIFT AS shift,
      COUNT(*) AS coil_count,
      COALESCE(SUM(F_SINGLE_COIL_WEIGHT), 0) AS total_weight_kg
    FROM LAB_INTERMEDIATE_DATA
    WHERE F_DeleteMark = 0
      AND F_PROD_DATE >= DATE_FORMAT(NOW(), '%Y-%m-01')
      AND F_PROD_DATE < DATE_FORMAT(NOW() + INTERVAL 1 MONTH, '%Y-%m-01')
      AND F_SHIFT IS NOT NULL
    GROUP BY F_SHIFT
    ORDER BY total_weight_kg DESC
