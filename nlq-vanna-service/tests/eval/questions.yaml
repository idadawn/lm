# ============================================================
# Tier 2 — 含 JSON_EXTRACT 联表判级（4 题）
# ============================================================

- id: T2-001
  tier: 2
  category: judgment
  # TODO: 业务方提供真实 question + reference_sql
  question: "查询 120 规格铁损大于 1.05 时对应的判级结果"
  reference_sql: >
    SELECT
      a.F_Id,
      a.iron_loss,
      JSON_EXTRACT(a.quality_attrs, '$.grade') AS grade,
      b.spec_name
    FROM lab_intermediate_data a
    JOIN lab_spec b ON a.spec_id = b.F_Id
    WHERE b.spec_name = '120'
      AND a.iron_loss > 1.05
    ORDER BY a.F_CREATORTIME DESC
  notes: "占位题：JSON_EXTRACT 判级联表"

- id: T2-002
  tier: 2
  category: judgment
  # TODO: 业务方提供真实 question + reference_sql
  question: "120 规格 Ps 铁损 > 1.05 的产品判什么等级"
  reference_sql: >
    SELECT
      a.F_Id,
      a.iron_loss,
      JSON_EXTRACT(a.quality_attrs, '$.Ps_grade') AS Ps_grade
    FROM lab_intermediate_data a
    JOIN lab_spec b ON a.spec_id = b.F_Id
    WHERE b.spec_name = '120'
      AND a.iron_loss > 1.05
    LIMIT 10
  notes: "占位题：Ps 铁损判级"

- id: T2-003
  tier: 2
  category: judgment
  # TODO: 业务方提供真实 question + reference_sql
  question: "查询叠片系数低于 0.95 时产品等级分布"
  reference_sql: >
    SELECT
      JSON_EXTRACT(a.quality_attrs, '$.grade') AS grade,
      COUNT(*) AS cnt
    FROM lab_intermediate_data a
    WHERE JSON_EXTRACT(a.quality_attrs, '$.stack_factor') < 0.95
    GROUP BY grade
    ORDER BY cnt DESC
  notes: "占位题：叠片系数过滤 + 分组"

- id: T2-004
  tier: 2
  category: judgment
  # TODO: 业务方提供真实 question + reference_sql
  question: "某批次产品的综合判级结果是什么"
  reference_sql: >
    SELECT
      a.batch_no,
      JSON_EXTRACT(a.quality_attrs, '$.final_grade') AS final_grade,
      COUNT(*) AS product_count
    FROM lab_intermediate_data a
    WHERE a.batch_no IS NOT NULL
    GROUP BY a.batch_no, final_grade
    ORDER BY a.batch_no DESC
    LIMIT 20
  notes: "占位题：批次综合判级"

