# ====================================================================
# 移动端内网调试网关 (Nginx) —— Docker / Linux 宿主用
# ⚠ Windows + Docker Desktop(WSL2) 下发布端口只到 127.0.0.1，内网不可达；
#   Windows 请改用原生 nginx：web/conf/nginx.mobile.win.conf + start-mobile-proxy.ps1
# --------------------------------------------------------------------
# 把「后端 API」与「NLQ 智能体」聚合到同一来源(origin)，这样 App 只需在
# 「我的 → 服务器设置」里配一个【主服务器地址】(lm_api_base_url) 即可：
#
#   http://<本机内网IP>:8928/api/...                  -> 后端        (:10089)
#   http://<本机内网IP>:8928/nlq-agent/api/v1/...     -> NLQ 智能体  (:8000，剥掉 /nlq-agent 前缀)
#   ws://<本机内网IP>:8928/api/message/websocket      -> 后端 WebSocket
#
# 端口 8928 与线上网关(47.105.59.151:8928)保持一致——真机只需把 IP 换成本机内网 IP。
#
# 以 conf.d 片段挂载到官方 nginx 镜像：/etc/nginx/conf.d/default.conf
# 该文件被 include 在 http{} 上下文中，因此可在此声明 map / upstream。
# ====================================================================

# WebSocket 升级所需：依据 Upgrade 请求头决定回写的 Connection 头
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 上游 = 宿主机上的本地服务。Docker Desktop / Linux(host-gateway) 通过
# host.docker.internal 访问宿主机回环上的服务。
upstream lm_backend { server host.docker.internal:10089; }
upstream lm_nlq     { server host.docker.internal:8000; }

server {
    listen      80;        # 容器内监听 80；由 compose 映射到宿主机 8928
    server_name _;
    charset     utf-8;

    client_max_body_size        100m;   # 头像/文件上传
    client_header_buffer_size   128k;
    large_client_header_buffers 4 128k;

    # ---- NLQ 智能体（SSE 流式）----
    # location 末尾斜杠 + proxy_pass 末尾斜杠 ⇒ 转发时剥掉 /nlq-agent 前缀
    #   /nlq-agent/api/v1/chat/stream  ->  http://:8000/api/v1/chat/stream
    location /nlq-agent/ {
        proxy_pass http://lm_nlq/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";        # 清空，避免与 SSE 的长连接冲突

        # SSE 关键项：关闭缓冲与缓存、放长读写超时，保证逐块(token)实时下发
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        3600s;
        proxy_send_timeout        3600s;
        chunked_transfer_encoding on;
    }

    # ---- 其余全部 -> 后端（含 /api 与 WebSocket）----
    location / {
        proxy_pass http://lm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 升级（后端 WS 路径：/api/message/websocket）。
        # 普通请求时 $connection_upgrade=close，不影响常规 API。
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 网关自身健康检查（区别于后端 /health）
    location = /__gw_health {
        access_log off;
        default_type text/plain;
        return 200 "gateway ok\n";
    }
}
