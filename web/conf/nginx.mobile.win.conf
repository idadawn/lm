# ====================================================================
# 原生 Windows Nginx —— 移动端内网调试网关（自包含完整配置）
# --------------------------------------------------------------------
# 为什么用原生 nginx 而不是 Docker：Docker Desktop(WSL2) 只把发布端口转发到
# 宿主机 127.0.0.1，不会在内网网卡上建真实套接字 → 手机无法访问。原生 nginx
# 直接在 Windows 上 listen 8928（0.0.0.0），是真实套接字，内网真机可达。
#
# 运行（见 start-mobile-proxy.ps1）：
#   nginx.exe -p <nginx安装目录> -c <仓库>/web/conf/nginx.mobile.win.conf
# 上游为本机回环（后端 :10089 / NLQ :8000，均在 0.0.0.0/:: 上监听）。
# 纯反代不渲染静态，无需 mime.types。
# ====================================================================

worker_processes  1;
error_log  logs/error.mobile.log  warn;
pid        logs/nginx.mobile.pid;

events { worker_connections 1024; }

http {
    default_type application/octet-stream;
    access_log   logs/access.mobile.log;
    sendfile     on;
    charset      utf-8;
    client_max_body_size 100m;

    # WebSocket 升级：依据 Upgrade 头决定 Connection 头
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream lm_backend { server 127.0.0.1:10089; }
    upstream lm_nlq     { server 127.0.0.1:8000; }

    server {
        listen      8928;          # = 0.0.0.0:8928，内网网卡可达
        server_name _;

        # ---- NLQ 智能体（SSE 流式，剥掉 /nlq-agent 前缀）----
        location /nlq-agent/ {
            proxy_pass http://lm_nlq/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_buffering           off;
            proxy_cache               off;
            proxy_read_timeout        3600s;
            proxy_send_timeout        3600s;
            chunked_transfer_encoding on;
        }

        # ---- 其余全部 -> 后端（含 /api 与 WebSocket /api/message/websocket）----
        location / {
            proxy_pass http://lm_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # 网关自身健康检查
        location = /__gw_health {
            access_log off;
            default_type text/plain;
            return 200 "gateway ok\n";
        }
    }
}
